<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Registration | BloodConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="assets/js/script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <a class="logo" href="index.html"><span class="logo-mark">B</span>BloodConnect</a>
      <button class="nav-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="donar.html">Donor</a>
        <a href="request.html">Request</a>
        <a href="service.html">Services</a>
        <a href="aboutus.html">About Us</a>
        <a class="button-small" href="login.html">Login</a>
        <a class="button" href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <section class="section-heading fade-in">
      <div>
        <h2>Donor Registration</h2>
        <p>Complete this form to help patients in your city with timely blood donations.</p>
      </div>
    </section>

    <section class="form-box fade-in">
      <form id="donorForm" action="donar.php" method="POST" onsubmit="return validateDonor()">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="1234567890" required pattern="[0-9]{10,15}" />
        </div>
        <div class="form-group">
          <label for="blood_group">Blood Group</label>
          <select id="blood_group" name="blood_group" required>
            <option value="">Select your blood type</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="City where you can donate" required />
        </div>
        <button type="submit" class="button">Submit Donor Info</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-text">© 2026 BloodConnect. Thank you for saving lives.</p>
    </div>
  </footer>
</body>
</html>

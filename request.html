<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Blood | BloodConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="assets/js/script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <a class="logo" href="index.html"><span class="logo-mark">B</span>BloodConnect</a>
      <button class="nav-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="donar.html">Donor</a>
        <a href="request.html">Request</a>
        <a href="service.html">Services</a>
        <a href="aboutus.html">About Us</a>
        <a class="button-small" href="login.html">Login</a>
        <a class="button" href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <section class="section-heading fade-in">
      <div>
        <h2>Submit a Blood Request</h2>
        <p>Complete the form below so your request reaches donors quickly.</p>
      </div>
      <a class="button button-secondary" href="donar.html"><i class="fas fa-hand-holding-heart"></i> Become a Donor</a>
    </section>

    <section class="form-box fade-in">
      <form id="requestForm" action="request.php" method="POST" onsubmit="return validateRequest()">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Patient or contact name" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="1234567890" required pattern="[0-9]{10,15}" />
        </div>
        <div class="form-group">
          <label for="blood_group">Blood Group</label>
          <select id="blood_group" name="blood_group" required>
            <option value="">Choose blood type</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="Delivery city" required />
        </div>
        <div class="form-group">
          <label for="message">Additional Info</label>
          <textarea id="message" name="message" rows="4" placeholder="Describe your blood requirement"></textarea>
        </div>
        <button type="submit" class="button">Submit Request</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-text">© 2026 BloodConnect. Your request is sent safely to the community.</p>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | BloodConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="assets/js/script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <a class="logo" href="index.html"><span class="logo-mark">B</span>BloodConnect</a>
      <button class="nav-toggle" aria-label="Open navigation"><i class="fas fa-bars"></i></button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="donar.html">Donor</a>
        <a href="request.html">Request</a>
        <a href="service.html">Services</a>
        <a href="aboutus.html">About Us</a>
        <a class="button-small" href="login.html">Login</a>
        <a class="button" href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <section class="form-box fade-in">
      <h1>Create your account</h1>
      <form id="registerForm" action="register.php" method="POST" onsubmit="return validateRegister()">
        <input type="hidden" name="form_type" value="user" />
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="button">Register</button>
        <p class="form-footer">Already have an account? <a href="login.html">Login here</a>.</p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-text">© 2026 BloodConnect. Register now to help save lives.</p>
    </div>
  </footer>
</body>
</html>
